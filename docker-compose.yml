services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: gridflow-backend
    environment:
      CORS_ORIGINS: ${CORS_ORIGINS}
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: gridflow-frontend
    depends_on:
      - backend
    environment:
      PORT: ${PORT:-8080}
      API_UPSTREAM: ${API_UPSTREAM:?API_UPSTREAM must be set in your .env file}
    ports:
      - "${FRONTEND_PORT:-8080}:${PORT:-8080}"
    restart: unless-stopped
